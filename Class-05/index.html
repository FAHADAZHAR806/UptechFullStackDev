<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>3x3 Empty Table</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">

  <div class="bg-white p-6 rounded-xl shadow-lg">

    <table class="border border-gray-400">
      <tbody>
        <!-- Row 1 -->
        <tr>
          <td id="cell-0-0" class="w-24 h-16 border border-gray-400 text-center"></td>
          <td id="cell-0-1" class="w-24 h-16 border border-gray-400 text-center"></td>
          <td id="cell-0-2" class="w-24 h-16 border border-gray-400 text-center"></td>
        </tr>

        <!-- Row 2 -->
        <tr>
          <td id="cell-1-0" class="w-24 h-16 border border-gray-400 text-center"></td>
          <td id="cell-1-1" class="w-24 h-16 border border-gray-400 text-center"></td>
          <td id="cell-1-2" class="w-24 h-16 border border-gray-400 text-center"></td>
        </tr>

        <!-- Row 3 -->
        <tr>
          <td id="cell-2-0" class="w-24 h-16 border border-gray-400 text-center"></td>
          <td id="cell-2-1" class="w-24 h-16 border border-gray-400 text-center"></td>
          <td id="cell-2-2" class="w-24 h-16 border border-gray-400 text-center"></td>
        </tr>
      </tbody>
    </table>



  </div>

  <script src="index.js"></script>


</body>

</html>
