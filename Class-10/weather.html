<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather App</title>

  <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-[#3a3a3a] min-h-screen  flex items-center justify-center">

  <div class="bg-white shadow-2xl rounded-2xl p-6 w-[90%] max-w-md text-center">

    <h1 class="text-3xl font-bold mb-4 text-gray-700">Weather App</h1>

    <div class="flex gap-2 mb-5">
      <input id="city" type="text" placeholder="Enter city name"
        class="flex-1 border p-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400" />

      <button onclick="getWeather()" class="bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600">
        Search
      </button>
    </div>

    <div id="weatherBox" class="hidden">

      <h2 id="cityName" class="text-2xl font-semibold text-gray-700"></h2>

      <div class="mt-4 space-y-2 text-gray-600">

        <p>🌡 Temperature: <span id="temp"></span> °C</p>

        <p>💨 Wind Speed: <span id="wind"></span> km/h</p>

        <p>🧭 Wind Direction: <span id="direction"></span>°</p>

      </div>

    </div>

  </div>


  <script src="weather.js"></script>

</body>

</html>
