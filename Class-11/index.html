<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>User Management</title>

  <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 p-6">

  <div class="max-w-6xl mx-auto">

    <h1 class="text-3xl font-bold mb-6">User Management</h1>

    <!-- SEARCH -->

    <input id="searchInput" type="text" placeholder="Search users..." class="border p-2 mb-4 w-full rounded" />


    <!-- FORM -->

    <form id="userForm" class="grid grid-cols-2 gap-3 mb-6">

      <input id="firstName" placeholder="First Name" class="border p-2 rounded">

      <input id="lastName" placeholder="Last Name" class="border p-2 rounded">

      <input id="email" placeholder="Email" class="border p-2 rounded">

      <input id="phone" placeholder="Phone" class="border p-2 rounded">

      <button class="bg-blue-500 text-white p-2 rounded col-span-2">
        Save User
      </button>

    </form>


    <!-- LOADER -->

    <div id="loader" class="hidden text-center text-lg">Loading...</div>


    <!-- TABLE -->

    <table class="w-full bg-white shadow rounded">

      <thead class="bg-gray-200">

        <tr>
          <th class="p-2">ID</th>
          <th class="p-2">First Name</th>
          <th class="p-2">Last Name</th>
          <th class="p-2">Email</th>
          <th class="p-2">Phone</th>
          <th class="p-2">Actions</th>
        </tr>

      </thead>

      <tbody id="userTable"></tbody>

    </table>

  </div>

  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/app.js"></script>

</body>

</html>
