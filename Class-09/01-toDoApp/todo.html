<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Modern Todo App</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen  flex items-center justify-center p-4">

  <!-- Main Container -->
  <div class="w-full max-w-md sm:max-w-lg md:max-w-xl bg-white rounded-3xl shadow-2xl p-6 sm:p-8">

    <!-- Header -->
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-2xl sm:text-3xl font-bold text-gray-800">
        Todo App
      </h1>
      <span id="taskCount" class="text-sm text-gray-500"></span>
    </div>

    <!-- Input Section -->
    <div class="flex flex-col sm:flex-row gap-3 mb-6">
      <input type="text" id="taskInput" placeholder="Enter a new task..."
        class="flex-1 px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500">
      <button onclick="addTask()"
        class="px-6 py-3 bg-indigo-600 text-white rounded-xl hover:bg-indigo-700 active:scale-95 transition duration-200">
        Add
      </button>
    </div>

    <!-- Task List -->
    <ul id="taskList" class="space-y-3 mb-6"></ul>

    <!-- Clear All -->
    <button onclick="clearAll()" class="w-full bg-red-500 text-white py-3 rounded-xl hover:bg-red-600 transition">
      Clear All Tasks
    </button>

  </div>

  <script src="todo.js"></script>
</body>

</html>
