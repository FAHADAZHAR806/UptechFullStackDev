<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
      background-color: rgb(235, 147, 33);

    }

    form {
      background-color: #3a3a3a;
      padding: 20px;
      border: solid;
      border-radius: 10px;
    }
  </style>
</head>

<body>
  <form>
    <label>Name:</label><br>
    <input type="text" id="name" required placeholder="Enter your Name"><br><br>

    <label>Email:</label><br>
    <input type="email" id="email" required placeholder="Enter your Email"><br><br>

    <label>Age:</label><br>
    <input type="number" id="age" required placeholder="Enter your age"><br><br>

    <label>Phone:</label><br>
    <input type="tel" id="phone" required placeholder="Enter your Phone Number"><br><br>

    <label>Message:</label><br>
    <textarea id="message" rows="4" required placeholder="Enter your Message"></textarea><br><br>

    <button type="button" onclick="submitForm()">Submit</button>
  </form>

  <script src="form.js"></script>
</body>

</html>
