<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Inventory</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

  <div class="max-w-7xl mx-auto p-6">

    <h1 class="text-3xl font-bold text-center mb-6">Product Inventory System</h1>

    <!-- CATEGORY FILTER -->
    <div class="mb-6 flex justify-between">
      <select id="categoryFilter" class="border p-2 rounded">
        <option value="all">All Categories</option>
        <option value="electronics">Electronics</option>
        <option value="jewelery">Jewelery</option>
        <option value="men's clothing">Men Clothing</option>
        <option value="women's clothing">Women Clothing</option>
      </select>
    </div>

    <!-- ADD PRODUCT FORM -->
    <div class="bg-white p-6 rounded shadow mb-6">
      <h2 class="text-xl font-semibold mb-4">Add Product</h2>

      <form id="productForm" class="grid md:grid-cols-2 gap-4">

        <input id="title" type="text" placeholder="Title" class="border p-2 rounded" required>

        <input id="price" type="number" placeholder="Price" class="border p-2 rounded" required>

        <input id="image" type="text" placeholder="Image URL" class="border p-2 rounded">

        <input id="category" type="text" placeholder="Category" class="border p-2 rounded">

        <textarea id="description" placeholder="Description" class="border p-2 rounded md:col-span-2"></textarea>

        <button class="bg-blue-600 text-white py-2 rounded md:col-span-2">
          Add Product
        </button>

      </form>
    </div>

    <!-- LOADING -->
    <div id="loading" class="text-center hidden text-xl font-bold">
      Loading...
    </div>

    <!-- PRODUCT GRID -->
    <div id="products" class="grid sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
    </div>

  </div>

  <script src="script.js"></script>

</body>

</html>
